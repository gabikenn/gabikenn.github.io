<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Selection</title>
    <!-- TODO: Import your CSS File here -->
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="container">
        <form id="characterForm", type="get, action="page3.html">
            <h1>Time to Decide!</h1>
            <fieldset>
                <legend>Choose Your Character</legend>
                <fieldset>
                <input type="radio" id="aria" name="choice" value="1" class ="character">
                <label for="html"><strong>Aria, the Warrior:</strong> Strong and brave, with the ability to overcome physical obstacles.</label>
                </fieldset><br>

                <fieldset>
                <input type="radio" id="eldrin" name="choice" value="2" class ="character">
                <label for="html"><strong>Eldrin, the Mage:</strong> Wise and knowledgeable, with the power to solve puzzles and cast spells.</label>
                </fieldset><br>

                <fieldset>
                <input type="radio" id="tara" name="choice" value="3" class ="character">
                <label for="html"><strong>Tara, the Rogue:</strong> Quick and cunning, with skills in stealth and persuasion.</label>
                </fieldset>
            </fieldset>
        </form>
        <button onclick="location.href='page3.html'">Continue</button>
    </section>
</body>
</html>

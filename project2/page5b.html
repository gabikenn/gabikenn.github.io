<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Path of Stealth</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="container">
        <h1>The Path of Stealth</h1>
        <p>To successfully navigate the Path of Stealth, you must choose your actions carefully. Select the correct sequence of actions to avoid detection and reach your objective.</p>
        
        <!-- Actions -->
        <div id="hide" class="stealth-option" onclick="selectAction(this)">Hide in the shadows</div>
        <div id="run" class="stealth-option" onclick="selectAction(this)">Run quickly to the next cover</div>
        <div id="distract" class="stealth-option" onclick="selectAction(this)">Create a distraction</div>
        <div id="wait" class="stealth-option" onclick="selectAction(this)">Wait for the right moment</div>
        
        <!-- Buttons in a column -->
        <div class="button-container">
            <button onclick="checkSequence()">Check Sequence</button>
            <button onclick="reset()">Reset!</button>
        </div>

        <script>
            let selectedActions = [];

            function selectAction(element) {
                if (!element.classList.contains('selected')) {
                    selectedActions.push(element.id);
                    element.classList.add('selected');
                }
            }

            function checkSequence() {
                const correctSequence = ['hide', 'wait', 'distract'];

                if (JSON.stringify(selectedActions) === JSON.stringify(correctSequence)) {
                    alert('You have successfully navigated the Path of Stealth! Continue your journey.');
                    window.location.href = "page6.html";
                } else {
                    alert('Your actions have alerted the guards! Try again.');
                    reset();
                }
            }

            function reset() {
                selectedActions = [];
                document.querySelectorAll('.stealth-option').forEach(option => {
                    option.classList.remove('selected');
                });
            }
        </script>
    </section>
</body>
</html>

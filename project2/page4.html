<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The First Obstacle</title>
    <!-- TODO: Import your CSS File here -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="container">
        <h1>The First Obstacle</h1>
        <p>As you venture deeper into the Dark Forest, you encounter a mystical guardian. The guardian blocks your path
            and poses a riddle:</p>
        <p><q>I speak without a mouth and hear without ears. I have no body, but I come alive with wind. What am I?</q>
        </p>

        <form method="get" action="page5.html">
            <label for="riddelAnswer">Your Answer:</label>
            <input type="text" id="riddleAnswer" name="riddelAnswer">
            <button type="submit" id="submitButton" style="background-color: red;">Submit Answer</button>
        </form>
    </section>
    <script>
        let subBtn = document.getElementById("submitButton");
        let answerInput = document.getElementById("riddleAnswer");
        let correctAnswer = "echo";

        function buttonChange(correctAnswer, answerInput) {
            if (answerInput.value.toLowerCase() === correctAnswer) {
                subBtn.style.backgroundColor = "green";
            }
            else {
                subBtn.style.backgroundColor = "red";
            }
        }
        answerInput.addEventListener("input", function () {
            buttonChange(correctAnswer, answerInput);
        });
    </script>
</body>

</html>

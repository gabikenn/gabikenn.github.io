<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quest Begins</title>
     <!-- TODO: Import your CSS File here -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="container">
        <h1>Pack Your Bag</h1>
        <p>Select the supplies you wish to take on your quest. Choose wisely, as you can only carry a limited amount.</p>
        <form>
            <div class="checkbox-container">
                <input type="checkbox" id="food">
                <label for="food">Food: Essential for energy.</label>
            </div>
            
            <div class="checkbox-container">
                <input type="checkbox" id="water">
                <label for="water">Water: Hydration is key!</label>
            </div>
        
            <div class="checkbox-container">
                <input type="checkbox" id="maps">
                <label for="maps">Maps: Don't get lost in the wilderness!</label>
            </div>

            <div class="checkbox-container">
                <input type="checkbox" id="shelter">
                <label for="shelter">Shelter: Stay safe from whatever weather may come your way!</label>
            </div>
        
            <div class="checkbox-container">
                <input type="checkbox" id="sword">
                <label for="sword">Sword: Fend off those pesky foes!</label>
            </div>

            <div class="checkbox-container">
                <input type="checkbox" id="bow">
                <label for="bow">Bow: Shoot your way through the battle!</label>
            </div>

            <div class="checkbox-container">
                <input type="checkbox" id="magicPotions">
                <label for="magicPotions">Magic Potions: For health and magical energy.</label>
            </div>

            <div class="checkbox-container">
                <input type="checkbox" id="staff">
                <label for="staff">Sorcerer's Staff: Focus, amplify, or store energy. Can you master it's power?</label>
            </div>

        </form>
        <button onclick="location.href='page4.html'">Continue</button>
    </section>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
        integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
</head>

<body>
    <main class="container">
        <br>
        <h1>Add Expenses</h1>
        <form id="expenseForm">
            <label for="expenseName" class="form-label">Place of Expense:</label>
            <input type="text" id="expenseName" class="form-control" required minlength="5">
            <br>

            <label for="date" class="form-label">Expense Date:</label>
            <input type="date" name="date" id="date" class="form-control" required>
            <br>

            <label for="amount" class="form-label">Expense Amount:</label>
            <input type="number" name="amount" id="date" class="form-control" required min="0" max="50000" step="0.01"
                pattern="^\d+(\.\d{1,2})?$" inputmode="decimal">
            <br>

            <label for="frequency" class="form-label">Frequency:</label>
            <select name="frequency" id="frequency" class="form-control" class="form-select">
                <option>One Time</option>
                <option>Monthly</option>
                <option>Bi-Weekly</option>
                <option>Yearly</option>
            </select>
            <br>

            <label for="expense" class="form-label">Expense Category:</label><br>

            <input type="radio" name="option" value="groceries" required>
            <label>Groceries</label><br>

            <input type="radio" name="option" value="business">
            <label>Business</label><br>

            <input type="radio" name="option" value="resaurants">
            <label>Resaurants</label><br>

            <input type="radio" name="option" value="fun">
            <label>Fun!</label><br><br>

            <label for="mode" class="form-label">Mode of Payment:</label>
            <select name="mode" id="mode" class="form-control">
                <option>Credit Card</option>
                <option>Debit Card</option>
                <option>Cash</option>
            </select><br>

            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </main>
</body>
</html>

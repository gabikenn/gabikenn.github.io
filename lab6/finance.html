    <title>Personal Finance Dashboard</title>
</head>
<body>

  <input
    type="text"
    id="sourceName"
    required
    minlength="3"

    type="number"
    id="amount"
    required
    min="0"
    step="0.01"
  >

  <button type="submit">Submit</button>
</form>

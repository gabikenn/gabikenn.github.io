<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Finance Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
</head>

<body>
  <main class="container">
  <br>
  <h1>Add Income</h1>
  <form id="financeForm">
      <label for="sourceName" class="form-label">Income Source Name:</label>
      <input type="text" id="sourceName" class="form-control" required minlength="3">
      <br>

      <label for="amount" class="form-label">Amount:</label>
      <input type="number" name="number" id="amount" class="form-control" required min="0" step="0.01" pattern="^\d+(\.\d{1,2})?$"
        inputmode="decimal" required>
      <br>

      <label for="frequency" class="form-label">Frequency:</label>
      <select name="frequency" id="frequency" class="form-control" required>
        <option>One Time</option>
        <option>Monthly</option>
        <option>Bi-Weekly</option>
        <option>Yearly</option>
      </select>
      <br>
      
      <button type="submit" class="btn btn-primary">Submit</button><br>
      <button onclick="location.href='expense.html'" type="submit" class="btn btn-primary">Expenses Page</button>
  </form>
  </main>
</body>
</html>
